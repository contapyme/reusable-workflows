# Reusable workflow — contapyme/reusable-workflows
# Uso: llámalo con `uses: contapyme/reusable-workflows/.github/workflows/owasp-zap-scan.yml@main`
name: OWASP ZAP Full Scan (Reusable)

on:
  workflow_call:
    inputs:
      # ── Repo de la app ─────────────────────────────────────────────────────
      repository:
        description: 'Repositorio de la app (org/repo)'
        type: string
        required: true
      ref:
        description: 'Branch o SHA a escanear'
        type: string
        required: false
        default: 'main'

      # ── Configuración de la app ─────────────────────────────────────────────
      port:
        description: 'Puerto donde corre la app (ej: 8000)'
        type: number
        required: true
      install_command:
        description: 'Comando de instalación de dependencias (ej: pip install -e .)'
        type: string
        required: true
      start_command:
        description: 'Comando para levantar la app en background'
        type: string
        required: true
      health_check_path:
        description: 'Path del endpoint de liveness'
        type: string
        required: false
        default: '/health'
      seed_command:
        description: 'Comando opcional para poblar datos de test (ej: python seed_admin.py). Corre después del health check.'
        type: string
        required: false
        default: ''

      # ── Autenticación ───────────────────────────────────────────────────────
      auth_type:
        description: 'Tipo de auth: none | static | dynamic | seed'
        type: string
        required: false
        default: 'dynamic'
      login_endpoint:
        description: 'Endpoint de login (solo para auth_type=dynamic)'
        type: string
        required: false
        default: '/api/v1/login'
      login_user_field:
        description: 'Campo del JSON de login para el usuario (ej: email)'
        type: string
        required: false
        default: 'email'
      login_pass_field:
        description: 'Campo del JSON de login para el password'
        type: string
        required: false
        default: 'password'
      login_token_field:
        description: 'Campo del JSON de respuesta que contiene el JWT'
        type: string
        required: false
        default: 'access_token'

      # ── URL objetivo ────────────────────────────────────────────────────────
      target:
        description: 'URL objetivo del scan. Vacío = http://localhost:<port>'
        type: string
        required: false
        default: ''

    secrets:
      # El caller pasa su propio ${{ secrets.GITHUB_TOKEN }} aquí
      CHECKOUT_TOKEN:
        required: true
      # Para auth_type=static: API key o Bearer token fijo
      API_TOKEN:
        required: false
      # Para auth_type=dynamic: credenciales de un usuario de test
      ZAP_USER:
        required: false
      ZAP_PASSWORD:
        required: false

jobs:
  zap-full-scan:
    runs-on: ubuntu-latest

    # ── Base de datos efímera para CI ───────────────────────────────────────
    # Credentials son solo para este runner; se destruyen al terminar el job.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: zapci_db
          POSTGRES_USER: zapci
          POSTGRES_PASSWORD: zapci_pass_CI_only
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # DATABASE_URL disponible para todos los steps (install, start, seed)
    env:
      DATABASE_URL: postgresql+asyncpg://zapci:zapci_pass_CI_only@localhost:5432/zapci_db

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      # Clona el repo del CALLER (no este repo de workflows) con su propio token
      - name: Checkout app repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          token: ${{ secrets.CHECKOUT_TOKEN }}

      # ── 2. Instalar dependencias ─────────────────────────────────────────────
      - name: Install dependencies
        run: ${{ inputs.install_command }}

      # ── 3. Levantar la app en background ────────────────────────────────────
      # La app arranca con DATABASE_URL del env del job → corre migraciones automáticas.
      # ZAP corre en Docker con --network host en Linux, por lo que localhost
      # del contenedor resuelve al host runner (comportamiento de GitHub Actions).
      - name: Start application in background
        run: |
          ${{ inputs.start_command }} &
          echo "APP_PID=$!" >> $GITHUB_ENV

      # ── 4. Health check — espera a que la app responda ───────────────────────
      # Reintenta hasta 30 veces cada 3 s (= 90 s máximo).
      # Acepta cualquier HTTP 2xx, 3xx o 4xx: si devuelve algo, la app ya levantó.
      - name: Wait for application to be ready
        run: |
          TARGET="http://localhost:${{ inputs.port }}${{ inputs.health_check_path }}"
          echo "Waiting for $TARGET ..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$TARGET" 2>/dev/null || echo "000")
            if [[ "$STATUS" =~ ^[2-4][0-9][0-9]$ ]]; then
              echo "App ready after $((i * 3))s (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i/30: HTTP $STATUS — retrying in 3s..."
            sleep 3
          done
          echo "ERROR: App did not start within 90 seconds"
          kill "$APP_PID" 2>/dev/null || true
          exit 1

      # ── 5. Seed opcional ─────────────────────────────────────────────────────
      # Si el caller provee seed_command, lo corre DESPUÉS de que la app arrancó.
      # Con auth_type=seed: el comando debe imprimir una línea "TOKEN=<jwt>" en stdout;
      # el workflow la captura y la usa como Bearer token para ZAP.
      - name: Run seed command (optional)
        if: inputs.seed_command != ''
        shell: bash
        run: |
          if [ "${{ inputs.auth_type }}" = "seed" ]; then
            TMPFILE=$(mktemp)
            ${{ inputs.seed_command }} | tee "$TMPFILE"; SEED_EXIT=${PIPESTATUS[0]}
            if [ $SEED_EXIT -ne 0 ]; then
              rm -f "$TMPFILE"
              exit $SEED_EXIT
            fi
            TOKEN_LINE=$(grep "^TOKEN=" "$TMPFILE" | tail -1)
            rm -f "$TMPFILE"
            if [ -z "$TOKEN_LINE" ]; then
              echo "ERROR: auth_type=seed pero el seed no emitió ninguna línea TOKEN=..."
              exit 1
            fi
            echo "AUTH_TOKEN=${TOKEN_LINE#TOKEN=}" >> "$GITHUB_ENV"
            echo "Token capturado del seed."
          else
            ${{ inputs.seed_command }}
          fi

      # ── 6a. Auth estática ────────────────────────────────────────────────────
      # Copia directamente el secret API_TOKEN a la variable AUTH_TOKEN
      - name: Set static auth token
        if: inputs.auth_type == 'static'
        run: echo "AUTH_TOKEN=${{ secrets.API_TOKEN }}" >> $GITHUB_ENV

      # ── 6b. Auth dinámica ────────────────────────────────────────────────────
      # 1. Construye el body del login con jq para manejar caracteres especiales
      # 2. Hace POST al endpoint de login
      # 3. Extrae el JWT del campo configurado y lo guarda en AUTH_TOKEN
      - name: Get dynamic auth token via login
        if: inputs.auth_type == 'dynamic'
        env:
          _ZAP_USER: ${{ secrets.ZAP_USER }}
          _ZAP_PASSWORD: ${{ secrets.ZAP_PASSWORD }}
          _USER_FIELD: ${{ inputs.login_user_field }}
          _PASS_FIELD: ${{ inputs.login_pass_field }}
          _TOKEN_FIELD: ${{ inputs.login_token_field }}
        run: |
          LOGIN_URL="http://localhost:${{ inputs.port }}${{ inputs.login_endpoint }}"
          echo "POST $LOGIN_URL"

          # Construir el JSON de login con jq (maneja comillas y caracteres especiales)
          BODY=$(jq -n \
            --arg u "$_ZAP_USER" \
            --arg p "$_ZAP_PASSWORD" \
            --arg uf "$_USER_FIELD" \
            --arg pf "$_PASS_FIELD" \
            '{($uf): $u, ($pf): $p}')

          RESPONSE=$(curl -sf -X POST "$LOGIN_URL" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          # Extraer el token del campo configurado
          TOKEN=$(echo "$RESPONSE" | jq -r --arg f "$_TOKEN_FIELD" '.[$f]')

          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "ERROR: No se pudo extraer el token '$_TOKEN_FIELD' de la respuesta"
            echo "Response: $RESPONSE"
            exit 1
          fi

          echo "AUTH_TOKEN=$TOKEN" >> $GITHUB_ENV
          echo "Token obtenido exitosamente."

      # ── 7. Inyectar token de auth para ZAP ──────────────────────────────────
      # ZAP_AUTH_HEADER / ZAP_AUTH_HEADER_VALUE son leídas por el Docker container
      # (-e ZAP_AUTH_HEADER -e ZAP_AUTH_HEADER_VALUE ya están en el docker run).
      # NO usar -config en cmd_options: getopt parsea -config como -c onfig
      # → FileNotFoundError: /zap/wrk/onfig → ZAP crash inmediato sin reportes.
      - name: Set ZAP auth header env vars
        if: inputs.auth_type != 'none'
        run: |
          echo "ZAP_AUTH_HEADER=Authorization" >> "$GITHUB_ENV"
          echo "ZAP_AUTH_HEADER_VALUE=Bearer ${AUTH_TOKEN}" >> "$GITHUB_ENV"

      # ── 8. OWASP ZAP Full Scan activo ───────────────────────────────────────
      # fail_action: false → el step nunca falla por sí solo; la decisión de
      # fallar la toma el step siguiente según la severidad real de las alertas.
      # NO pasar -r/-w/-J en cmd_options: el proceso zap dentro del Docker (user 'zap')
      # no tiene permiso para escribir en /zap/wrk/ con nombres custom. El action
      # wrapper escribe los reportes por defecto con los permisos correctos.
      - name: OWASP ZAP Active Full Scan
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: ${{ inputs.target != '' && inputs.target || format('http://localhost:{0}', inputs.port) }}
          fail_action: false
          allow_issue_writing: false

      # ── 9. Fallar solo si hay alertas High (riskcode=3) ──────────────────────
      # Medium=2, Low=1, Informational=0 — quedan en el reporte pero no rompen el job.
      - name: Fail on High alerts
        if: always()
        run: |
          if [ ! -f report_json.json ]; then
            echo "report_json.json no encontrado — ZAP no generó reporte"
            exit 1
          fi
          HIGH=$(python3 -c "
          import json, sys
          data = json.load(open('report_json.json'))
          alerts = [a for s in data.get('site', []) for a in s.get('alerts', [])]
          high = [a for a in alerts if str(a.get('riskcode', '')) == '3']
          print(len(high))
          " 2>/dev/null || echo "0")
          if [ "$HIGH" -gt 0 ]; then
            echo "::error::ZAP encontró $HIGH alerta(s) High — revisar el reporte"
            exit 1
          fi
          echo "Sin alertas High. Scan completado."

      # ── 10. Subir reportes como artifact ────────────────────────────────────
      # if: always() garantiza que los reportes se suban incluso si el step
      # anterior falló por alertas High.
      # Nombres por defecto generados por zaproxy/action-full-scan@v0.10.0.
      - name: Upload ZAP scan reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-reports-${{ github.run_id }}
          path: |
            report_html.html
            report_md.md
            report_json.json
          if-no-files-found: warn
